[Launch]
ProgramExecutable=LMStudio\LM Studio.exe
DirectoryMoveOK=yes
SupportsUNC=yes
CleanTemp=false
SinglePortableAppInstance=true
WaitForProgram=true

[Activate]
Registry=true

[DirectoriesMove]
AppData=%APPDATA%\LM Studio
LocalAppData=%LOCALAPPDATA%\LM Studio
DotLMStudio=%USERPROFILE%\.lmstudio
DotCache=%USERPROFILE%\.cache\lm-studio

[FilesMove]

[DirectoriesCleanupIfEmpty]
1=%APPDATA%\LM Studio
2=%LOCALAPPDATA%\LM Studio